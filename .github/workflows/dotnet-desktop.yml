name: .NET Core Win 10+ Desktop

on:
  push:
    tags:
      - 'v*'
  #  branches: [ "master" ]
  #pull_request:
  #  branches: [ "master" ]

jobs:
  build_and_release:
    strategy:
      matrix:
        configuration: [Release]           # [Debug, Release]
        architecture: [x86, x64]           # [x86, x64]

    runs-on: windows-latest

    env:
      Solution_Name: Zsnd-UI.slnx
      Project_Name: Zsnd-UI.csproj

    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    # Add  MSBuild to the PATH: https://github.com/microsoft/setup-msbuild
    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    # Execute all unit tests in the solution
    - name: Execute unit tests
      run: dotnet test $env:Project_Name

    # Restore the application to populate the obj folder with RuntimeIdentifiers
    - name: Restore the application
      run: msbuild $env:Solution_Name /t:Restore /p:Configuration=$env:Configuration
      env:
        Configuration: ${{ matrix.configuration }}

    # Create the app package by building and packaging the Windows Application Packaging project
    - name: Create the app package ${{ matrix.architecture }} ${{ matrix.configuration }}
      run: |
        dotnet publish $env:Project_Name -r $env:Profile -p:Platform=$env:Platform -p:PublishReadyToRun=true -p:PublishTrimmed=false -p:PublishDir=bin\Publish\
      env:
        Platform: ${{ matrix.architecture }}
        Profile: win-${{ matrix.architecture }}

    # Make Release
    #- name: Get latest release
    #  id: get_latest_release
    #  uses: pozetroninc/github-action-get-latest-release@master
    #  with:
    #    repository: ${{ github.repository }}

    - name: Create new release
      uses: softprops/action-gh-release@v2
      with:
        token: "${{ secrets.GITHUB_TOKEN }}"
        #tag_name: ${{ steps.get_latest_release.outputs.release }}-beta
        #body: ${{ steps.get_latest_release.outputs.description }}
        #draft: true
        generate_release_notes: true
        files: bin/Publish/Zsnd-UI-*.exe

    # Alternatively, Upload the built files: https://github.com/marketplace/actions/upload-a-build-artifac
